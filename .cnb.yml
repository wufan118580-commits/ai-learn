main:
  push:
    - stages:
        # 阶段1：准备依赖
        - name: 准备Python依赖
          image: python:3.9-slim
          script: |
            mkdir -p build_output
            echo "📦 安装依赖..."
            if [ -f requirements.txt ]; then
              pip install -r requirements.txt -t ./build_output/vendor
            else
              echo "⚠️ requirements.txt not found"
              exit 1
            fi
            cp app.py build_output/
            
            # 添加SCF入口适配
            cat > build_output/serverless_wsgi_handler.py << 'EOF'
            import sys
            import os
            sys.path.insert(0, os.path.join(os.path.dirname(__file__), "vendor"))
            from app import app
            from serverless_wsgi import handle_request

            def main_handler(event, context):
                return handle_request(app, event, context)
            EOF
        
        # 阶段2：打包并部署
        - name: 部署到SCF
          image: tencentcom/scf
          # 引入密钥仓库的地址
          imports:
            - https://cnb.cool/Studuent-Wu/tencent-cloud-secrets/-/blob/main/scf-secrets.yml
          # settings:
          #   TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          #   TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
          script: |
            cd build_output
            zip -r ../flask-app.zip .
            cd ..
            
            # 部署SCF
            scf deploy --function-name flask-demo \
              --runtime Python3.9 \
              --handler serverless_wsgi_handler.main_handler \
              --zip-file flask-app.zip \
              --region ap-guangzhou \
              --memory-size 512 \
              --timeout 3
            
            # 可选：创建API网关触发器
            scf create-trigger --function-name flask-demo \
              --type apigw \
              --region ap-guangzhou