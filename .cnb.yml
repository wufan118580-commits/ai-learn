main:
  push:
    - stages:
        # 阶段1：准备依赖
        - name: 准备Python依赖
          image: python:3.9-slim
          script: |
            # mkdir -p build_output/vendor
            mkdir -p deploy/vendor
            echo "📦 安装系统工具..."
            apt-get update && apt-get install -y zip  # 这里安装zip
            echo "📦 安装Python依赖..."
            if [ -f requirements.txt ]; then
              # pip install -r requirements.txt -t ./build_output/vendor
              pip install -r requirements.txt -t ./deploy/vendor
            else
              echo "⚠️ requirements.txt not found"
              exit 1
            fi
            # cp app.py ./build_output/
            cp app.py deploy/
            
            # 添加SCF入口适配
            # cat > build_output/serverless_wsgi_handler.py << 'EOF'
            cat > deploy/serverless_wsgi_handler.py << 'EOF'
            import sys
            import os
            sys.path.insert(0, os.path.join(os.path.dirname(__file__), "vendor"))
            from app import app
            from serverless_wsgi import handle_request

            def main_handler(event, context):
                return handle_request(app, event, context)
            EOF

             
            if [ -f serverless.yml ]; then
              cp serverless.yml deploy/
            fi

            # echo "📦 打包为SCF部署包..."
            # cd build_output
            # zip -r ../flask-app.zip .
            # cd ..
            # echo "✅ 打包完成：flask-app.zip"
            echo "✅ 部署目录准备完成，位置：./deploy"
            ls -la deploy/
        
        # 阶段2：打包并部署
        - name: 部署到SCF
          image: tencentcom/scf
          # 引入密钥仓库的地址
          imports:
            - https://cnb.cool/Studuent-Wu/tencent-cloud-secrets/-/blob/main/scf-secrets.yml
          # settings:
          #   TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          #   TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
          script: |
            # cd build_output
            # zip -r ../flask-app.zip .
            # cd ..
            # 解压zip文件到deploy目录
        
            # 直接部署目录（SCF工具会自动打包上传）
            echo "📂 查看部署目录内容..."
            ls -la deploy/
            
            echo "🚀 开始部署到云函数..."
            cd deploy
            # 部署SCF
            echo "🚀 部署SCF函数..."
            scf deploy --function-name flask-demo \
              --runtime Python3.9 \
              --handler serverless_wsgi_handler.main_handler \
              --region ap-guangzhou \
              --memory-size 512 \
              --timeout 10
            
            # 可选：创建API网关触发器
            scf create-trigger --function-name flask-demo \
              --type apigw \
              --region ap-guangzhou \
              --trigger-name api-gateway \
              --enable