name: CI/CD Pipeline

# ============================================================
# 触发规则说明：
#   push to develop     → 测试 + 构建验证（不部署）
#   push to main        → 测试 + 构建 + 部署到腾讯云生产环境
#   pull_request→ main  → 全套测试 + 构建验证（PR 质量门禁）
# ============================================================

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.11'
  # 镜像标签：使用 commit SHA 确保唯一性，同时打 latest 标签
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ================================================================
  # Job 1: 测试 & 代码质量（所有触发都会运行）
  # ================================================================
  test:
    name: 🧪 单元测试 & 代码检查
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8

    - name: Run unit tests
      run: |
        pytest tests/ -v --cov=src --cov-report=term-missing

    - name: Check code quality (flake8)
      run: |
        flake8 src/ tests/ --count --select=E9,F63,F7,F82,W191 --show-source --statistics

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: .coverage

  # ================================================================
  # Job 2: 构建并验证 API 镜像
  # ================================================================
  build-api:
    name: 🔨 构建 API 镜像
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build API image
      run: |
        docker build -f Dockerfile.api \
          --cache-from=type=gha \
          --cache-to=type=gha,mode=max \
          -t workspace-api:${{ github.sha }} \
          -t workspace-api:latest .

    - name: Verify API image (import check)
      run: |
        docker run --rm workspace-api:latest python -c "import torch; print(f'PyTorch: {torch.__version__}, CUDA: {torch.cuda.is_available()}'); from api.services.formula_ocr_service import FormulaOCRService; print('FormulaOCRService import OK')"

  # ================================================================
  # Job 3: 构建并验证 UI 镜像
  # ================================================================
  build-ui:
    name: 🖥️ 构建 UI 镜像
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build UI image
      run: |
        docker build -f Dockerfile.ui \
          --cache-from=type=gha \
          --cache-to=type=gha,mode=max \
          -t workspace-ui:${{ github.sha }} \
          -t workspace-ui:latest .

    - name: Verify UI image (import check)
      run: |
        docker run --rm workspace-ui:latest python -c "import streamlit; print(f'Streamlit: {streamlit.__version__}'); from src.handlers.formula_handler import FormulaHandler; print('FormulaHandler import OK')"

    - name: Confirm no torch in UI image
      run: |
        docker run --rm workspace-ui:latest bash -c "! python -c 'import torch' 2>/dev/null && echo 'UI镜像不含torch(符合预期)' || echo 'UI镜像不应包含torch'"

  # ================================================================
  # Job 4: 部署（仅 push to main）→ 通过 SSH 部署到腾讯云服务器
  # ================================================================
  deploy:
    name: 🚀 部署到腾讯云生产环境
    runs-on: ubuntu-latest
    needs: [build-api, build-ui]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # ----------------------------------------------------------
    # 步骤1: 配置 .env 文件（从 GitHub Secrets 注入敏感信息）
    # ----------------------------------------------------------
    - name: Configure .env file
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      run: |
        cp .env.example .env

        # 从 Secrets 替换敏感配置
        if [ -n "$DEEPSEEK_API_KEY" ]; then
          sed -i "s|^DEEPSEEK_API_KEY=.*|DEEPSEEK_API_KEY=$DEEPSEEK_API_KEY|" .env
          echo "✅ DEEPSEEK_API_KEY 已从 GitHub Secrets 注入"
        else
          echo "⚠️ 未配置 DEEPSEEK_API_KEY Secret，使用默认值"
        fi

        # 显示非敏感配置（确认注入成功，不泄露密钥）
        echo "--- .env 配置预览 ---"
        grep -v "KEY" .env || true
        echo "----------------------"

    # ----------------------------------------------------------
    # 步骤2: 通过 SSH 部署到腾讯云轻量应用服务器
    # ----------------------------------------------------------
    - name: Deploy to Tencent Cloud via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        # ====== 这些值来自 GitHub Secrets ======
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          set -e  # 遇错立即停止

          echo "📍 开始部署到腾讯云服务器..."

          # 配置 Git 代理（国内服务器访问 GitHub 需要加速）
          # 代理格式: https://gh-proxy.com/https://github.com/OWNER/REPO.git
          export GIT_PROXY_URL="https://gh-proxy.com"
          export GITHUB_REPO_URL="https://github.com/${{ github.repository }}.git"
          echo "🔧 配置 Git 加速: ${GIT_PROXY_URL}/${GITHUB_REPO_URL}"

          # 进入项目目录（首次会自动 clone）
          if [ -d "${{ secrets.PROJECT_PATH }}" ]; then
            cd ${{ secrets.PROJECT_PATH }}
            echo "📂 项目目录存在，拉取最新代码..."
            # 设置远程 URL 为加速地址
            git remote set-url origin ${GIT_PROXY_URL}/${GITHUB_REPO_URL}
            git fetch origin main
            git reset --hard origin/main
          else
            echo "📂 首次部署，克隆项目..."
            git clone ${GIT_PROXY_URL}/${GITHUB_REPO_URL} ${{ secrets.PROJECT_PATH }}
            cd ${{ secrets.PROJECT_PATH }}
            git checkout main
          fi

          # 恢复远程 URL（避免后续操作走代理出问题）
          git remote set-url origin https://github.com/${{ github.repository }}.git

          # 写入 .env 文件
          echo "⚙️  配置环境变量..."
          cp .env.example .env
          sed -i "s|^DEEPSEEK_API_KEY=.*|DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}|" .env

          # 停止旧容器、重新构建并启动
          echo "🔄 重启 Docker 服务..."
          docker compose down --remove-orphans || true
          docker compose build --no-cache
          docker compose up -d

          # 等待服务启动并进行健康检查
          echo "⏳ 等待服务启动..."
          sleep 30

          echo "🔍 健康检查..."
          MAX_RETRIES=6
          for i in $(seq 1 $MAX_RETRIES); do
            API_HEALTH=$(curl -sf http://localhost:8000/health 2>/dev/null || echo "unhealthy")
            echo "[$i/$MAX_RETRIES] API: $API_HEALTH"

            if echo "$API_HEALTH" | grep -q '"status":"healthy"'; then
              echo "✅ API 服务健康"
              break
            fi

            if [ "$i" = "$MAX_RETRIES" ]; then
              echo "❌ API 服务启动失败！查看日志："
              docker compose logs api --tail=30
              exit 1
            fi
            sleep 10
          done

          echo ""
          echo "========================================="
          echo "✅ 部署完成！服务已上线"
          echo "========================================="
          echo ""
          docker compose ps
          echo ""

    # ----------------------------------------------------------
    # 步骤3: 部署后通知（可选）
    # ----------------------------------------------------------
    - name: Deployment summary
      if: always()
      run: |
        echo "## 🚀 部署结果" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| 项目 | 详情 |" >> $GITHUB_STEP_SUMMARY
        echo "|------|------|" >> $GITHUB_STEP_SUMMARY
        echo "| 分支 | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| 触发者 | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
        echo "| 时间 | $(date '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY