name: Python application test with GitHub Actions

on: 
  push:
    branches:
      - main  # 或者 master，根据你的主分支名称

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.8'  # 指定Python版本

    - name: Install dependencies
      run: |
        make install

    - name: Lint code
      run: |
        make lint

    - name: Run tests
      run: |
        make test

    - name: Format code
      run: |
        # 运行代码格式化工具，例如 black
        make format
