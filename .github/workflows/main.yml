name: CI and Sync

on: 
  push:
    branches:
      [ main, develop ]  # 监听 main 和 develop 分支的推送
    pull_request:
      branches:
        [ main ]  # 监听指向这两个分支的 PR

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.9"]

    steps:
    - name: Check out code
      uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}  # 指定Python版本


    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        # key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements-dev.txt') }}
        # restore-keys: |
        #   ${{ runner.os }}-pip-
       
      
    - name: Install dependencies
      run: |
        make install-dev

    - name: Lint code
      run: |
        make lint

    - name: Run tests
      run: |
        make test

    # - name: Format code
    #   run: |
    #     # 运行代码格式化工具，例如 black
    #     make format

    # - name: Upload coverage report
    #   uses: codecov/codecov-action@v3
    #   with:
    #     name: coverage-report
    #     path: .coverage

    # 新增：只有 main 分支的推送才同步到 CNB
  sync-to-cnb:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Sync to CNB Repository
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:${{ github.workspace }} \
            -w ${{ github.workspace }} \
            -e PLUGIN_TARGET_URL="https://cnb.cool/Studuent-Wu/ai-learn-demo.git" \
            -e PLUGIN_AUTH_TYPE="https" \
            -e PLUGIN_USERNAME="cnb" \
            -e PLUGIN_PASSWORD=${{ secrets.CNB_TOKEN }} \
            -e PLUGIN_FORCE="true" \
            tencentcom/git-sync