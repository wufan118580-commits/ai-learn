services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: formula-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=8000
      - HOST=0.0.0.0
    volumes:
      # 公式识别历史记录持久化存储
      - formula_data:/app/formula_history
      # 模型缓存持久化（避免每次启动重新下载 Pix2Tex 模型）
      # 注意：路径需与基础镜像的 site-packages 匹配：
      #   - python:3.11-slim → /usr/local/lib/python3.11/site-packages/
      #   - pytorch/pytorch (conda) → /opt/conda/lib/python3.11/site-packages/
      - pix2tex_model_cache:/usr/local/lib/python3.11/site-packages/pix2tex/model/checkpoints
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 1
      start_period: 180s

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: document-learning-assistant
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - FORMULA_API_URL=http://api:8000
    volumes:
      # HTML 文件持久化存储
      - html_data:/app/html_storage
      # 可选：配置文件持久化
      - ./config:/app/config
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  html_data:
    driver: local
  formula_data:
    driver: local
  pix2tex_model_cache:
    external: true



