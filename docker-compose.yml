version: '3.8'

services:
  app:
    build: .
    container_name: document-learning-assistant
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    volumes:
      # HTML 文件持久化存储
      - html_data:/app/html_storage
      # 可选：配置文件持久化
      - ./config:/app/config
    restart: unless-stopped

volumes:
  html_data:
    driver: local
