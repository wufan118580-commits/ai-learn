services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: formula-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=8000
      - HOST=0.0.0.0
    volumes:
      # 公式识别历史记录持久化存储
      - formula_data:/app/formula_history
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: document-learning-assistant
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - FORMULA_API_URL=http://api:8000
    volumes:
      # HTML 文件持久化存储
      - html_data:/app/html_storage
      # 可选：配置文件持久化
      - ./config:/app/config
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  html_data:
    driver: local
  formula_data:
    driver: local
