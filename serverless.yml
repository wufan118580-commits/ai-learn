# serverless.yml
component: scf
name: flask-demo

globalOptions:        # <--- 添加此行
  configRole: scf-flask-demo-role  # <--- 填入你创建的角色名

inputs:
  name: flask-demo
  src: ./deploy
  runtime: Python3.9
  region: ap-guangzhou
  handler: serverless_wsgi_handler.main_handler
  memorySize: 512
  timeout: 10
  events:
    - apigw:
        parameters:
          endpoints:
            - path: /
              method: ANY